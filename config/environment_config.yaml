# environment_config.yaml
# ========================
# Trading environment, session, and account settings.
#
# All price-based thresholds are expressed in TICKS (per-instrument).
# Switch instruments by changing `instruments.default` — every downstream
# module reads geometry from utils.instrument.InstrumentProfile.

# Data loading configuration
data:
  instrument: ES             # ES | NQ | GC | MES | MNQ
  timeframe: "1min"          # 5min | 1min (extensible for future)
  file_format: "feather"     # feather (fastest) | npy | pkl | csv (slowest)
                             # Auto-detects in priority order: feather → npy → pkl → csv

instruments:
  allowed: [ES, MES, NQ, MNQ, GC]
  default: ES

session:
  bar_timeframe_minutes: 1       # Must match data.timeframe (1 for 1-min, 5 for 5-min)
  daily_timeframe: "1D"
  timezone: "America/New_York"  # NY/ET timezone

  # session_type controls which bars are used for each episode:
  #   RTH    → 09:30–16:00 ET  (Regular Trading Hours)
  #   GLOBEX → bars outside RTH in the same day file (pre/post market)
  #   FULL   → all bars in the day file (23-hour session)
  session_type: "RTH"

  rth_start_utc: "09:30"        # RTH open  (America/New_York local)
  rth_end_utc:   "16:00"        # RTH close (America/New_York local)
  globex_start:  "18:00"        # Globex re-open after settlement break
  globex_end:    "09:15"        # Globex close before RTH open

# Per-instrument tick-based profiles.
# Geometry keys ending in _ticks are multiplied by tick_size at load time
# (utils.instrument.load_instrument_profile) to produce point values.
#
# Sizing tiers:
#   Minis (ES/NQ)   — integer contracts only, capped at 2
#   Micros (MES/MNQ) — integer contracts only, higher tiers allowed
contracts:
  ES:
    micro_point_value: 50.0        # $ per point per contract
    tick_size: 0.25
    tick_value: 12.50
    stop_buffer_ticks: 6           # 1.5 pts beyond far zone edge
    min_target_ticks: 12           # 3.0 pts minimum TP distance
    jitter_ticks: 8                # 2.0 pts augmentation jitter
    min_zone_ticks: 4              # reject zones < 1.0 pt
    max_zone_ticks: 40             # reject zones > 10.0 pts
    fallback_stop_ticks: 12        # 3.0 pts emergency stop
    contract_tiers: [ 2,4]
    confluence_tier_thresholds: [0.65]

  MES:
    micro_point_value: 5.0
    tick_size: 0.25
    tick_value: 1.25
    stop_buffer_ticks: 6
    min_target_ticks: 12
    jitter_ticks: 8
    min_zone_ticks: 4
    max_zone_ticks: 40
    fallback_stop_ticks: 12
    contract_tiers: [1, 2, 3, 5, 8]
    confluence_tier_thresholds: [0.60, 0.70, 0.80, 0.90]

  NQ:
    micro_point_value: 20.0
    tick_size: 0.25
    tick_value: 5.0
    stop_buffer_ticks: 24          # 6.0 pts (NQ ATR ≈ 4× ES)
    min_target_ticks: 48           # 12.0 pts
    jitter_ticks: 32               # 8.0 pts
    min_zone_ticks: 16             # 4.0 pts
    max_zone_ticks: 160            # 40.0 pts
    fallback_stop_ticks: 48        # 12.0 pts
    contract_tiers: [ 2, 4]
    confluence_tier_thresholds: [0.65]

  MNQ:
    micro_point_value: 2.0
    tick_size: 0.25
    tick_value: 0.50
    stop_buffer_ticks: 24
    min_target_ticks: 48
    jitter_ticks: 32
    min_zone_ticks: 16
    max_zone_ticks: 160
    fallback_stop_ticks: 48
    contract_tiers: [1, 2, 3, 5, 8]
    confluence_tier_thresholds: [0.60, 0.70, 0.80, 0.90]

  GC:
    micro_point_value: 100.0        # $ per point per contract (100 oz)
    tick_size: 0.1
    tick_value: 10.0
    stop_buffer_ticks: 50           # 5.0 pts (GC typical range ≈ 10-15 pts/day)
    min_target_ticks: 20            # 2.0 pts
    jitter_ticks: 10                # 1.0 pt
    min_zone_ticks: 10              # 1.0 pt
    max_zone_ticks: 100             # 10.0 pts
    fallback_stop_ticks: 50         # 5.0 pts
    contract_tiers: [1, 2, 3]
    confluence_tier_thresholds: [0.65]

account:
  initial_balance: 100000.0      # starting account equity ($)
  max_drawdown_limit: 2000.0    # hard daily drawdown limit ($) for guardrail check

observation:
  clip_observations: 10.0        # clip obs vector to [-N, N]
  normalize_observations: false  # running normalisation (enable for production)

  # Timeframe-based lookback_bars: maintains same TIME window across different bar frequencies
  # 5-min:  40 bars × 5 min = 200 min = 3.3 hours (obs_dim = 40×4 + 53 = 213)
  # 1-min: 200 bars × 1 min = 200 min = 3.3 hours (obs_dim = 200×4 + 53 = 853)
  # Agent reads: lookback_bars[timeframe_from_config]
  lookback_bars:
    "5min": 40
    "1min": 200

  # Zone detector still uses 500-bar history (zone_lookback_bars in
  # features_config.yaml) — this only controls the obs window.

episode:
  early_termination_on_max_drawdown: true

curriculum:
  enabled: false
  stages: []
