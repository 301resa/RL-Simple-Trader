# agent_config.yaml
# ==================
# PPO agent and neural network configuration.

# RecurrentPPO uses an LSTM hidden state that carries within-session memory.
# Obs: 60-bar OHLC window (240) + structured (36) + engineered (17) = 293 features.
# Volume excluded — strategy is price-structure based (zones, ATR, sweeps).
# HTF context (1h/2h range position, momentum coherence) is in the engineered block.
algorithm: RecurrentPPO
seed: 42
device: auto          # "auto", "cpu", or "cuda"

ppo:
  learning_rate: 3.0e-4
  learning_rate_schedule: cosine   # "linear", "cosine", or "constant"
  n_steps: 2048                    # rollout buffer per env
  batch_size: 256                  # mini-batch (must divide n_steps × n_envs)
  n_epochs: 8                     # gradient passes per rollout
  gamma: 0.99                      # discount factor
  gae_lambda: 0.95                 # GAE lambda
  clip_range: 0.2                  # PPO clip range
  ent_coef: 0.01                   # entropy coefficient (initial; annealed by exploration:)
  vf_coef: 0.8                     # value function coefficient
  max_grad_norm: 0.5               # gradient clipping
  total_timesteps: 4_000_000       # total training steps

network:
  net_arch:
    pi: [128, 128]                 # policy MLP layers after LSTM
    vf: [256, 256]                 # value  MLP layers after LSTM
  use_layer_norm: true
  use_lstm: true                   # RecurrentPPO requires true
  lstm_hidden_size: 192            # LSTM units
  n_lstm_layers: 2
  activation_fn: ReLU              # "ReLU", "Tanh", "ELU"
  ortho_init: true                 # orthogonal weight initialisation

exploration:
  ent_coef_start: 0.09             # entropy at start of training
  ent_coef_end:   0.001            # entropy at end of annealing
  ent_coef_decay_steps: 2_000_000  # steps over which to anneal (50% of total)

checkpointing:
  save_freq: 100_000               # SB3 periodic checkpoint every N steps → logs/checkpoints/
  keep_n_checkpoints: 30           # keep only the N most recent

evaluation:
  eval_freq:       100_000         # run val metrics every N training steps
  n_eval_episodes: 20              # val episodes per evaluation run
  save_enabled:    true            # false = log eval metrics without saving any models
  warmup_steps:    600_000         # no early stopping before this step
  patience_steps:  750_000         # stop if no composite improvement for N steps
  # ── Ensemble evaluation (test_fold Pass 2) ────────────────────────────────
  # After all checkpoints are ranked, the top ensemble_top_k are loaded together.
  # At every bar of each test day they each vote; the majority action is executed
  # as a single trade. Weak models cannot override the committee consensus.
  # Set to 1 to use only the single best model. Set to 0 to skip ensemble.
  ensemble_top_k: 3
  # Composite save score weights
  w_sharpe: 0.40                   # Sharpe ratio (primary signal)
  w_pnl:    0.30                   # Total P&L in R
  w_wl:     0.15                   # Win / Loss ratio
  w_dd:     0.15                   # Max drawdown (penalises risk)

hotsave:
  # Gate 1 — Profit Factor / Win Rate
  # Requires min_envs_passing envs to simultaneously satisfy all criteria.
  pf_threshold:     1.45           # minimum profit factor
  wr_threshold:     0.38           # minimum win rate (0–1)
  min_envs_passing: 2              # envs that must simultaneously clear Gate 1
  cooldown_steps:   50_000         # minimum steps between Gate-1 saves

  # Gate 2 — WR70  (any single env)
  wr70_cooldown_steps: 50_000      # minimum steps between Gate-2 saves

  # Gate 3 — Elite  (any single env achieving exceptional quality)
  # Criteria: cumulative PnL > elite_pnl_multiplier × initial_capital
  #           AND WR × PF   > elite_wr_pf_threshold
  #           AND Sharpe    > elite_sharpe_threshold
  elite_pnl_multiplier:   1.08      # required cumulative return multiple
  elite_wr_pf_threshold:  1.7      # WR × PF combined quality score
  elite_sharpe_threshold: 2.2      # annualised Sharpe (elite tier)
  elite_cooldown_steps:   50_000    # minimum steps between Gate-3 saves

  # Minimum trade count — scaled by training date range length.
  # Formula: max(10, n_trading_days × min_trades_per_week ÷ 5)
  # Examples: 12 months (~252 days) → 151 trades | 6 months (~126 days) → 75 trades
  min_trades_per_week: 0.5           # trades per trading week required on average

augmentation:
  # max_jitter_pts comes from the instrument profile (jitter_ticks × tick_size).
  trend_scale:    0.08   # session return scaling ±8%

multiprocessing:
  n_envs: 8              # parallel training environments
  use_subprocess: true   # SubprocVecEnv (true) or DummyVecEnv (false)

walk_forward:
  n_folds: 1             # folds to train (-1 = all possible)
  train_months: 60       # training window (~252 trading days)
  val_weeks: 2          # validation window (~10 trading days)
  output_dir: logs/walk_forward
