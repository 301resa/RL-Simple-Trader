# reward_config.yaml
# ===================
# Shaped reward function configuration.
# All values are R-multiples (multiples of initial risk).

core:
  scale: 1.0                            # global reward scaling factor

step:
  # ── Hold-flat penalty ────────────────────────────────────────────────────
  # CRITICAL FOR TRADE FREQUENCY: this must make holding costlier than a bad
  # entry.  At -0.005/bar a single bad entry (entry_cost + no_zone + no_liq
  # ≈ -0.37) would cost the same as 74 bars of holding → agent never trades.
  # At -0.025/bar the daily hold cost (≈ 78 RTH bars × 0.025 ≈ 1.95/day)
  # exceeds a typical loss (-1R × 0.5 WR ≈ -0.5), forcing at least 4-5
  # trades per day to break even on the inactivity penalty alone.
  hold_flat_penalty: -0.025             # 5× increase: forces agent to seek entries

entry_bonuses:
  full_order_zone_confluence: 0.50      # both pillars present: zone + sweep
  in_supply_demand_zone: 0.25          # price is inside a valid zone (increased from 0.20)
  liquidity_sweep_present: 0.20        # recent sweep detected (increased from 0.15)
  atr_has_room: 0.15                   # ATR not yet in warning territory
  high_rr_ratio: 0.20                  # R:R >= minimum
  # rejection_candle_present removed — Pillar 3 no longer used

entry_penalties:
  # ── Entry cost ────────────────────────────────────────────────────────────
  # Keep very small — we want the agent to trade; cost comes from outcome.
  entry_cost: -0.005                    # near-zero: don't penalise exploration

  # ── Zone/setup penalties (halved) ────────────────────────────────────────
  # Rationale: no_zone + no_liq stacking was -0.20 per entry in addition to
  # entry_cost and rr_below_minimum.  Combined ≈ -0.37 before outcome, which
  # made every out-of-zone entry worse than 74 bars of holding.  Halving
  # allows the agent to explore setups in early training without being
  # paralysed; the reward signal still learns to prefer zones over time.
  no_zone_present: -0.05                # halved from -0.10
  atr_exhausted: -0.40                  # slightly reduced; reward already penalises this
  rr_below_minimum: -0.08               # halved from -0.15
  no_liquidity_confluence: -0.05        # halved from -0.10
  overtrading: 0.0                      # removed — no hard cap; daily loss limit (-3R) is the brake

exit_rewards:
  trailing_stop_correctly: 0.30       # used trail stop before exit
  aggressive_trail_at_4r: 0.20        # trailed aggressively at 4R profit
  exit_at_atr_target: 0.20            # hit the ATR-based profit target

exit_penalties:
  held_past_4r_no_trail: -0.50        # held past 4R without trailing
  gave_back_profit_pct: 0.30          # weight applied to R given back from peak

violations:
  max_drawdown_breach: -2.00          # hard guardrail breach
  daily_loss_limit_breach: -1.00      # daily loss limit hit

discipline:
  re_entry_after_loss_streak_penalty: -0.20
  loss_streak_threshold: 3
