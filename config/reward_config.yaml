# reward_config.yaml
# ===================
# Shaped reward function configuration.
# All values are R-multiples (multiples of initial risk).

core:
  scale: 1.0                            # global reward scaling factor

step:
  # ── Hold-flat penalty ────────────────────────────────────────────────────
  # CRITICAL FOR TRADE FREQUENCY: this must make holding costlier than a bad
  # entry.  At -0.025/bar the daily hold cost (≈ 78 RTH bars × 0.025 ≈ 1.95/day)
  # exceeds a typical loss (-1R × 0.5 WR ≈ -0.5), forcing at least 4-5
  # trades per day to break even on the inactivity penalty alone.
  hold_flat_penalty: -0.01             # 5× increase: forces agent to seek entries

entry_bonuses:
  full_order_zone_confluence: 0.50      # price inside a valid zone with ATR room
  in_supply_demand_zone: 0.3          # price is inside a valid zone
  atr_has_room: 0.15                   # ATR not yet in warning territory
  high_rr_ratio: 0.7                  # R:R >= minimum
  # liquidity_sweep_present removed — sweep pillar removed from system
  # rejection_candle_present removed — Pillar 3 not used

entry_penalties:
  # ── Entry cost ────────────────────────────────────────────────────────────
  entry_cost: -0.0015                         # near-zero: don't penalise exploration

  # ── Zone/setup penalties ──────────────────────────────────────────────────
  no_zone_present: -0.15               # increased: entering outside a zone is a clear mistake
  atr_exhausted: -0.40
  rr_below_minimum: -0.2             # increased: bad R:R is a sniper failure
  overtrading: 0.0                      # daily loss limit (-3R) is the brake

  # ── MAE (max adverse excursion) ───────────────────────────────────────────
  # Penalises entries where price moved significantly against before resolving.
  # Good entries (sniper) should have minimal adverse excursion before working.
  mae_penalty_weight: 0.40             # weight × max(0, mae_r - mae_threshold_r)
  mae_threshold_r: 0.40               # MAE below this is acceptable (R multiples)

exit_rewards:
  trailing_stop_correctly: 0.5       # used trail stop before exit
  aggressive_trail_at_4r: 0.20        # trailed aggressively at 4R profit
  exit_at_atr_target: 0.20            # hit the ATR-based profit target
  mfe_efficiency_weight: 0.15         # reward for capturing fraction of max favorable move

exit_penalties:
  held_past_4r_no_trail: -0.50        # held past 4R without trailing
  gave_back_profit_pct: 0.30          # weight applied to R given back from peak

violations:
  max_drawdown_breach: -2.00          # hard guardrail breach
  daily_loss_limit_breach: -1.50      # daily loss limit hit

discipline:
  re_entry_after_loss_streak_penalty: -0.5
  loss_streak_threshold: 4


# need to be written in a way that allows for easy tuning of selectivity vs. frequency tradeoff
selectivity:
  no_trade_reward: 0.05
  weak_zone_penalty: -0.05
  min_confluence_for_entry: 0.5



time_management:
  max_bars_before_penalty: 12        # ~1 hour on 5min TF
  penalty_per_bar: -0.01             # per-bar penalty after threshold
  bonus_fast_resolution: 0.10        # if TP hit within fast_trade_bars
  fast_trade_bars: 6                 # reward if TP within this
  min_hold_bars: 2                   # penalize agent_exit before this many bars
  too_fast_penalty: -0.10            # penalty for agent-exiting too quickly