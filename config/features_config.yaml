# features_config.yaml
# =====================
# Feature engineering parameters for all signal modules.
#
# Price-based geometry (stop buffers, zone-width caps, min-zone width)
# lives in environment_config.yaml under contracts.<SYMBOL> as tick counts
# and is loaded via utils.instrument.InstrumentProfile.

atr:
  period: 1                       # Previous day's true range — adapts zone/gate thresholds to current volatility
  exhaustion_threshold: 0.85      # directional move >= 85% ATR → block that direction only
  danger_threshold: 0.85          # same threshold (warning = exhaustion)

# Number of prior-session bars fed to zone detector on each reset.
# Timeframe-aware: maintains same clock-time context regardless of bar frequency.
# At 5-min:  500 bars × 5 min = 2,500 min ≈ 41 hours ≈ 3–4 prior sessions.
# At 1-min: 2500 bars × 1 min = 2,500 min ≈ 41 hours (same structural context).
zone_lookback_bars:
  "5min": 500
  "1min": 2500

zones:
  # Detection mode:
  #   "consolidation" — tight coil + impulse bar (original method)
  #   "wugamlo"       — last red candle before N consecutive green candles (bullish OB)
  #                     last green candle before N consecutive red candles (bearish OB)
  #   "sonarlab"      — ROC momentum crossover → first opposing candle 4-15 bars back
  detection_mode: "sonarlab"
  ob_length: 3                     # wugamlo: consecutive confirming candles required
  ob_threshold_pct: 0.0            # wugamlo: min % move from OB close to last confirm bar (0 = off)
  ob_use_wicks: false              # wugamlo: use full High-Low (true) or Open-Low/High (false)
  # Timeframe-aware: matches real-time ROC sensitivity across bar frequencies.
  # 5-min: 20 → 0.20% 4-bar open move (~20 min)
  # 1-min: 10 → 0.10% 4-bar open move (~4 min — appropriate for 1-min ES volatility)
  ob_sensitivity:
    "5min": 20
    "1min": 10

  consolidation_min_bars: 2        # minimum bars in consolidation base
  consolidation_max_bars: 8      # widened from 8 — allows more zone formations
  consolidation_range_atr_pct: 0.05   # widened from 0.035 — 8% of ATR; was too tight for 5-min bars
  impulse_min_body_atr_pct: 0.06    # lowered from 0.06 — easier impulse detection
  max_zone_touches: 5             # allow one extra touch before invalidation
  max_zone_age_bars: 300           # extended from 200 — zones live a little longer
  zone_buffer_atr_pct: 0.03        # slightly wider membership buffer

order_zone:
  min_confluence_score: 0.45
  weights:
    zone: 0.45                    # supply/demand zone quality score
    atr: 0.10                      # ATR room remaining (directional)
    sweep: 0.45                   # sweep freshness (1.0=just swept → 0.0 at 40 bars)
