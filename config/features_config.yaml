# features_config.yaml
# =====================
# Feature engineering parameters for all signal modules.

atr:
  period: 1                       # Previous day's true range — adapts zone/gate thresholds to current volatility
  exhaustion_threshold: 0.85      # directional move >= 85% ATR → block that direction only
  danger_threshold: 0.85          # same threshold (warning = exhaustion)

# Number of prior-session bars fed to zone detector on each reset.
# At 5-min bars: 500 bars ≈ 40 hours ≈ 3–4 prior trading sessions.
# Increase for more structural context; decrease to speed up reset.
zone_lookback_bars: 500

zones:
  consolidation_min_bars: 2        # minimum bars in consolidation base
  consolidation_max_bars: 10       # widened from 8 — allows more zone formations
  consolidation_range_atr_pct: 0.08   # widened from 0.035 — 8% of ATR; was too tight for 5-min bars
  impulse_min_body_atr_pct: 0.08     # lowered from 0.12 — easier impulse detection
  max_zone_touches: 3             # allow one extra touch before invalidation
  max_zone_age_bars: 300           # extended from 200 — zones live a little longer
  zone_buffer_atr_pct: 0.03        # slightly wider membership buffer

# trend: section retained only so existing code that reads it doesn't break,
# but TrendClassifier output is NOT included in the observation or action mask.
# The LSTM carries directional memory across candles instead.
trend:
  min_hh_hl_for_uptrend: 2
  min_ll_lh_for_downtrend: 2
  reversal_requires_breaks: 2
  strength_lookback_bars: 40

order_zone:
  min_confluence_score: 0.45       # zone score alone drives confluence
  weights:                         # sweep removed — zone is the dominant signal
    zone: 0.90                     # supply/demand zone membership
    atr: 0.10                      # ATR room remaining (directional)
